name: Build v2ray-rules-dat
on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RULE_ECO=https://raw.githubusercontent.com/jadahmambu/ocrule/main/rule_eco.txt" >> $GITHUB_ENV
          echo "RULE_MICROSOFT=https://raw.githubusercontent.com/jadahmambu/ocrule/main/rule_microsoft.txt" >> $GITHUB_ENV
        shell: bash

      - name: Checkout v2ray-rules-dat
        uses: actions/checkout@v4

      - name: Checkout v2fly/domain-list-community
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: community

      - name: Append custom rules
        run: |
          # 7. RULE-ECO (Konversi otomatis domain: & keyword:)
          wget -qO ./community/data/rule-eco-raw $RULE_ECO || echo "full:ex.com" > ./community/data/rule-eco-raw
          sed -i 's/\r//g' ./community/data/rule-eco-raw || true
          
          > ./community/data/rule-eco
          while read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            if [[ "$line" =~ ^keyword: ]]; then
              echo "regex:${line#keyword:}" >> ./community/data/rule-eco
            elif [[ "$line" =~ ^domain: ]]; then
              echo "${line#domain:}" >> ./community/data/rule-eco
            else
              echo "$line" >> ./community/data/rule-eco
            fi
          done < ./community/data/rule-eco-raw
          
          cp ./community/data/rule-eco rule-eco.txt

          # 8. RULE-MICROSOFT (Sama persis dengan pola skrip ECO)
          wget -qO ./community/data/rule-microsoft-raw $RULE_MICROSOFT || echo "full:ex.com" > ./community/data/rule-microsoft-raw
          sed -i 's/\r//g' ./community/data/rule-microsoft-raw || true
          
          > ./community/data/rule-microsoft
          while read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            if [[ "$line" =~ ^keyword: ]]; then
              echo "regex:${line#keyword:}" >> ./community/data/rule-microsoft
            elif [[ "$line" =~ ^domain: ]]; then
              echo "${line#domain:}" >> ./community/data/rule-microsoft
            else
              echo "$line" >> ./community/data/rule-microsoft
            fi
          done < ./community/data/rule-microsoft-raw
          
          cp ./community/data/rule-microsoft rule-microsoft.txt

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.22.0'

      - name: Build geosite.dat
        run: |
          cd community
          go run main.go
          cd ..
          cp ./community/geosite.dat ./geosite.dat

      - name: Download GeoIP
        run: |
          wget -qO ./geoip.dat https://github.com/v2fly/geoip/releases/latest/download/geoip.dat

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          draft: false
          prerelease: false
          files: |
            geosite.dat
            geoip.dat
            rule-eco.txt
            rule-microsoft.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
